# 8082 — Person 2 ML/XAI uses 8081; dashboard Vite proxy expects graph engine on 8082.
server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: fraudgraph-graph-engine
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: fraudgraph-graph-engine
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.fraudgraph.graphengine.dto.ScoredTransaction
      auto-offset-reset: earliest
      enable-auto-commit: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

fraudgraph:
  kafka:
    scored-topic: ${KAFKA_TOPIC_SCORED:transactions.scored}
  api:
    base-url: ${SPRING_API_BASE_URL:http://localhost:8080}
  graph:
    pagerank-iterations: ${PAGERANK_ITERATIONS:15}
    pagerank-damping: ${PAGERANK_DAMPING:0.85}
    alert-throttle-seconds: ${ALERT_THROTTLE_SECONDS:30}
